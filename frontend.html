<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>City Hospital - Sarah (AI Receptionist)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; }
        
        /* Smooth, Organic Ring Animation */
        .glowing-ring {
            position: relative;
            width: 300px; height: 300px;
            border-radius: 50%;
            background: #000;
            display: flex; align-items: center; justify-content: center;
            z-index: 10;
        }
        .glowing-ring::before {
            content: ''; position: absolute;
            top: -5px; left: -5px; right: -5px; bottom: -5px;
            background: conic-gradient(#f472b6, #a78bfa, #60a5fa, #f472b6); /* Softer, warmer colors */
            border-radius: 50%; z-index: -1;
            filter: blur(20px); opacity: 0.6;
            transition: all 0.5s ease;
        }
        .ring-idle::before { animation: rotate-slow 10s linear infinite, breathe 4s ease-in-out infinite; }
        .ring-listening::before { filter: blur(30px); opacity: 0.9; animation: rotate-fast 2s linear infinite; }
        .ring-speaking::before { filter: blur(25px); opacity: 0.8; animation: pulse-speak 1.5s infinite ease-in-out; }

        @keyframes rotate-slow { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes rotate-fast { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        @keyframes pulse-speak { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.12); } }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-100 h-screen w-screen overflow-hidden">

    <div id="dashboard-screen" class="h-full w-full flex flex-col items-center justify-center p-6 relative z-10">
        
        <div class="absolute top-6 left-6 flex items-center gap-3">
            <div class="w-10 h-10 bg-indigo-600 rounded-lg flex items-center justify-center text-white shadow-lg">
                <i class="fa-solid fa-hospital text-xl"></i>
            </div>
            <div>
                <h1 class="text-xl font-bold text-gray-800">City Hospital</h1>
                <p class="text-xs text-gray-500">Appointments</p>
            </div>
        </div>

        <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-md text-center border border-gray-100 transition-all hover:shadow-2xl">
            <div class="mb-6">
                <h2 class="text-2xl font-bold text-gray-900">Talk to Sarah</h2>
                <p class="text-gray-500 text-sm mt-1">Our automated voice assistant.</p>
            </div>

            <div class="space-y-4 mb-6 text-left">
                <div>
                    <label class="text-xs font-semibold text-gray-500 uppercase ml-1">Patient Name</label>
                    <input type="text" id="input-name" placeholder="E.g. Rahul Sharma" class="w-full mt-1 p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:bg-white outline-none transition-all">
                </div>
                <div>
                    <label class="text-xs font-semibold text-gray-500 uppercase ml-1">Email ID</label>
                    <input type="email" id="input-email" placeholder="rahul@example.com" class="w-full mt-1 p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:bg-white outline-none transition-all">
                </div>
            </div>
            
            <div class="relative mb-6">
                 <label class="text-xs font-semibold text-gray-500 uppercase ml-1 block text-left mb-1">Language</label>
                <select id="language-select" class="w-full appearance-none bg-gray-50 border border-gray-200 text-gray-700 p-3 rounded-xl leading-tight focus:outline-none focus:bg-white focus:border-indigo-500 font-medium cursor-pointer">
                    <option value="en-IN">English (India)</option>
                    <option value="hi-IN">Hindi (हिंदी)</option>
                    <option value="te-IN">Telugu (తెలుగు)</option>
                </select>
                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 pt-6 text-gray-600">
                    <i class="fa-solid fa-chevron-down text-xs"></i>
                </div>
            </div>

            <button id="start-call-btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-4 rounded-xl shadow-lg shadow-indigo-200 transition-all duration-300 transform hover:scale-[1.02] flex items-center justify-center gap-2">
                <i class="fa-solid fa-microphone"></i>
                Start Voice Call
            </button>
        </div>
    </div>

    <div id="call-screen" class="hidden fixed inset-0 bg-[#0f1115] z-50 flex flex-col">
        <div class="p-6 flex justify-between items-start">
            <div class="bg-[#1f2129] rounded-xl w-48 h-32 flex flex-col items-center justify-center border border-gray-800 shadow-lg">
                <p class="text-gray-500 text-sm font-medium">Camera Off</p>
                <i class="fa-solid fa-video-slash text-gray-600 mt-2"></i>
            </div>
            <div class="bg-[#1f2129] px-4 py-2 rounded-full border border-gray-700 flex items-center gap-2">
                <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                <span id="call-timer" class="text-gray-300 text-sm font-mono">00:00</span>
            </div>
        </div>

        <div class="flex-grow flex items-center justify-center relative">
            <div id="visual-ring" class="glowing-ring ring-idle">
                <div class="w-[290px] h-[290px] bg-[#0f1115] rounded-full flex items-center justify-center z-20">
                    <i id="status-icon" class="fa-solid fa-wave-square text-6xl text-gray-600 opacity-50"></i>
                </div>
            </div>
            
            <div class="absolute bottom-1/4 left-6 flex items-center gap-3">
                 <div class="w-10 h-10 rounded-full bg-pink-900/50 border border-pink-500/30 flex items-center justify-center">
                    <span class="text-pink-200 font-bold text-xs">AI</span>
                 </div>
                 <div>
                     <p class="text-white text-sm font-semibold">Sarah (Receptionist)</p>
                     <p id="agent-status" class="text-gray-400 text-xs">Connecting...</p>
                 </div>
            </div>
        </div>

        <div class="w-full px-6 mb-24 flex justify-center">
            <div id="transcript-box" class="hidden bg-[#1e293b] border border-blue-500/30 text-white p-4 rounded-2xl shadow-2xl max-w-2xl w-full flex items-start gap-4 transition-all duration-500 transform translate-y-4 opacity-0">
                <i class="fa-solid fa-message text-blue-400 mt-1"></i>
                <div class="flex-grow">
                     <p id="transcript-text" class="text-sm md:text-base leading-relaxed text-blue-50"></p>
                </div>
            </div>
        </div>

        <div class="absolute bottom-0 w-full bg-[#181a1f] p-4 flex justify-between items-center border-t border-gray-800">
            <div class="flex gap-2">
                <button id="mute-toggle" class="bg-[#2a2d36] w-12 h-12 rounded-full flex items-center justify-center text-white hover:bg-[#353942]">
                    <i id="mute-icon" class="fa-solid fa-microphone"></i>
                </button>
            </div>
            <button id="end-call-btn" class="bg-red-600 w-16 h-12 rounded-full flex items-center justify-center text-white shadow-lg hover:bg-red-700">
                <i class="fa-solid fa-phone-slash"></i>
            </button>
            <div class="w-12"></div>
        </div>
    </div>

    <script>
        const API_URL = "http://127.0.0.1:8000";
        let sessionId = null;
        let isRecording = false;
        let currentAudio = null;
        let timerInterval = null;

        const dashboard = document.getElementById('dashboard-screen');
        const callScreen = document.getElementById('call-screen');
        const startCallBtn = document.getElementById('start-call-btn');
        const endCallBtn = document.getElementById('end-call-btn');
        const muteBtn = document.getElementById('mute-toggle');
        const langSelect = document.getElementById('language-select');
        const inputName = document.getElementById('input-name');
        const inputEmail = document.getElementById('input-email');
        const visualRing = document.getElementById('visual-ring');
        const statusIcon = document.getElementById('status-icon');
        const agentStatus = document.getElementById('agent-status');
        const transcriptBox = document.getElementById('transcript-box');
        const transcriptText = document.getElementById('transcript-text');
        const callTimer = document.getElementById('call-timer');

        // Speech API
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.onstart = () => { isRecording = true; updateVisuals('listening'); };
            recognition.onend = () => { isRecording = false; if(!currentAudio) updateVisuals('idle'); };
            recognition.onresult = (e) => { 
                const text = e.results[0][0].transcript; 
                showTranscript(text); 
                handleBackendComm(text); 
            };
        }

        startCallBtn.addEventListener('click', () => {
            if (!SpeechRecognition) { alert("Please use Chrome or Edge for voice support."); return; }
            dashboard.classList.add('hidden');
            callScreen.classList.remove('hidden');
            startTimer();
            initiateAgent();
        });

        endCallBtn.addEventListener('click', () => { location.reload(); });

        async function initiateAgent() {
            try {
                const initRes = await fetch(`${API_URL}/agent/new_session`, { method: 'POST' });
                sessionId = (await initRes.json()).session_id;

                const pName = inputName.value.trim();
                const pEmail = inputEmail.value.trim();
                
                if (pName || pEmail) {
                    showTranscript(`(Sent) Name: ${pName}`);
                    // Hidden prompt to inform Sarah of the user's details
                    handleBackendComm(`[SYSTEM INFO: User Name is ${pName}, Email is ${pEmail}. Greet them by name.]`);
                } else {
                    handleBackendComm("Hello");
                }
            } catch (e) { showTranscript("Error connecting to server."); }
        }

        async function handleBackendComm(text) {
            updateVisuals('thinking');
            
            try {
                const res = await fetch(`${API_URL}/agent/message`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        session_id: sessionId,
                        text: text,
                        language_code: langSelect.value
                    })
                });

                const data = await res.json();
                showTranscript(data.text);
                
                if (data.audio) {
                    playAudio(data.audio);
                } else {
                    triggerListening();
                }
            } catch (e) {
                console.error(e);
                triggerListening();
            }
        }

        function playAudio(base64Audio) {
            updateVisuals('speaking');
            if (currentAudio) currentAudio.pause();
            
            currentAudio = new Audio("data:audio/mp3;base64," + base64Audio);
            currentAudio.onended = () => {
                currentAudio = null;
                triggerListening(); 
            };
            currentAudio.play();
        }

        function triggerListening() {
            if (recognition && !isRecording) {
                recognition.lang = langSelect.value;
                recognition.start();
            }
        }

        function showTranscript(text) {
            transcriptBox.classList.remove('hidden', 'opacity-0', 'translate-y-4');
            transcriptText.innerText = text;
        }

        function updateVisuals(state) {
            visualRing.className = "glowing-ring";
            statusIcon.className = "";
            muteBtn.classList.remove('bg-green-600');

            if (state === 'listening') {
                visualRing.classList.add('ring-listening');
                statusIcon.className = "fa-solid fa-microphone text-6xl text-green-500";
                agentStatus.innerText = "Listening...";
                muteBtn.classList.add('bg-green-600');
            } else if (state === 'thinking') {
                visualRing.classList.add('ring-idle');
                statusIcon.className = "fa-solid fa-brain text-6xl text-purple-500 animate-pulse";
                agentStatus.innerText = "Sarah is thinking...";
            } else if (state === 'speaking') {
                visualRing.classList.add('ring-speaking');
                statusIcon.className = "fa-solid fa-volume-high text-6xl text-pink-500";
                agentStatus.innerText = "Sarah is speaking...";
            } else {
                visualRing.classList.add('ring-idle');
                statusIcon.className = "fa-solid fa-wave-square text-6xl text-gray-600 opacity-50";
                agentStatus.innerText = "Ready";
            }
        }

        function startTimer() {
            let sec = 0;
            callTimer.innerText = "00:00";
            timerInterval = setInterval(() => {
                sec++;
                callTimer.innerText = new Date(sec * 1000).toISOString().substr(14, 5);
            }, 1000);
        }

        muteBtn.addEventListener('click', () => {
            if (isRecording) { recognition.stop(); updateVisuals('idle'); } 
            else triggerListening();
        });
    </script>
</body>
</html>
